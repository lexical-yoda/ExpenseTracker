<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Login — Expense Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/themes.css">
  <script>document.documentElement.setAttribute('data-theme',(localStorage.getItem('em-palette')||'github')+'-'+(localStorage.getItem('em-mode')||'dark'));</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 380px;
    }

    .login-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 2rem;
      color: var(--accent);
      letter-spacing: -1px;
      text-align: center;
      margin-bottom: 8px;
    }

    .login-sub {
      text-align: center;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 32px;
      letter-spacing: 0.3px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      padding: 13px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(88, 166, 255, 0.15);
    }

    .login-btn {
      width: 100%;
      background: var(--accent);
      color: #ffffff;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    [data-theme="light"] .login-btn {
      color: #ffffff;
    }

    .login-btn:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .error-msg {
      background: rgba(255, 77, 77, 0.08);
      border: 1px solid rgba(255, 77, 77, 0.2);
      border-radius: var(--radius);
      color: var(--danger);
      font-size: 0.8rem;
      padding: 10px 14px;
      margin-bottom: 16px;
      text-align: center;
    }
  </style>
</head>
<body>

<button class="theme-toggle theme-toggle-fixed" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"></button>

<div class="login-card">
  <div class="login-logo">Expense Manager</div>
  <div class="login-sub">Sign in to continue</div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <div class="form-group">
      <label for="username">Username</label>
      <input type="text" id="username" name="username" required autocomplete="username" autofocus>
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
    </div>

    <button type="submit" class="login-btn">Sign In</button>
  </form>
</div>

<script src="/static/theme.js"></script>
<script>initThemePicker();</script>
</body>
</html>
