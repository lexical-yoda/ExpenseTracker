<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0d1117">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Analytics — Expense Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.26.0/plotly.min.js"></script>
  <script src="/static/interactions.js"></script>
  <link rel="stylesheet" href="/static/themes.css">
  <script>document.documentElement.setAttribute('data-theme',(localStorage.getItem('em-palette')||'github')+'-'+(localStorage.getItem('em-mode')||'dark'));</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-mono); min-height: 100vh; padding-bottom: 60px;
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 1.3rem; color: var(--accent); letter-spacing: -0.5px; text-decoration: none; }
    .nav-logout { color: var(--danger) !important; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.75rem;
      padding: 6px 12px; border-radius: 6px; transition: all 0.15s;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--accent); }

    .container { max-width: 1400px; margin: 0 auto; padding: 24px 20px; }

    .page-header { margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-title { font-family: var(--font-display); font-weight: 700; font-size: 1.6rem; }

    .section-label {
      font-family: var(--font-display); font-weight: 600; font-size: 0.85rem;
      color: var(--muted); text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 12px; margin-top: 8px;
    }

    /* Stat cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    @media (max-width: 900px) { .stats-row { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 480px) { .stats-row { grid-template-columns: 1fr 1fr; } }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .stat-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-family: var(--font-display); font-size: 1.2rem; font-weight: 700; }
    .stat-sub { font-size: 0.65rem; color: var(--muted); margin-top: 3px; }
    .stat-sub .up { color: var(--danger); }
    .stat-sub .down { color: var(--success); }
    .stat-sub .neutral { color: var(--muted); }

    /* Charts grid */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }
    @media (min-width: 900px) {
      .charts-grid { grid-template-columns: 1fr 1fr; }
      .charts-grid .chart-card.full-width { grid-column: 1 / -1; }
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
    }
    .chart-title { font-family: var(--font-display); font-weight: 600; font-size: 0.95rem; margin-bottom: 16px; color: var(--text); }
    .chart-wrap { width: 100%; }
    .chart-empty { color: var(--muted); font-size: 0.8rem; text-align: center; padding: 40px 0; }

    /* Mobile nav */
    @media (max-width: 600px) {
      nav { flex-direction: column; gap: 10px; padding: 12px 16px; }
      .nav-links { flex-wrap: wrap; justify-content: center; }
    }
    /* Filter pills */
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 50px; color: var(--muted); font-family: var(--font-mono);
      font-size: 0.72rem; padding: 6px 14px; cursor: pointer; transition: all 0.15s;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .filter-pill:hover { border-color: var(--accent-dim); color: var(--text); }
    .filter-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(88,166,255,0.08); }

    /* Custom date range */
    .date-range-row {
      display: none; gap: 8px; align-items: center; margin-top: 12px; flex-wrap: wrap;
    }
    .date-range-row.open { display: flex; }
    .date-range-row input[type="date"] {
      background: var(--surface); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-family: var(--font-mono); font-size: 0.75rem;
      padding: 6px 10px; outline: none; -webkit-appearance: none; appearance: none;
    }
    .date-range-row input[type="date"]:focus { border-color: var(--accent); }
    .date-range-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .date-range-apply {
      background: var(--accent); color: #ffffff; border: none; border-radius: 8px;
      font-family: var(--font-display); font-weight: 700; font-size: 0.72rem;
      padding: 7px 14px; cursor: pointer; transition: all 0.15s; text-transform: uppercase; letter-spacing: 0.5px;
    }
    .date-range-apply:hover { opacity: 0.85; }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Expense Manager</a>
  <div class="nav-links">
    <a href="/">Dashboard</a>
    <a href="/analytics" class="active">Analytics</a>
    <a href="/manage">Manage</a>
    <a href="/accounts">Accounts</a>
    <a href="/settings">Settings</a>
    <a href="/logout" class="nav-logout" onclick="event.preventDefault();fetch('/logout',{method:'POST',headers:{'X-CSRFToken':document.querySelector('meta[name=csrf-token]').content}}).then(()=>location.href='/login')">Log Out</a>
    <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme"></button>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div class="page-title">Analytics</div>
    <div class="filter-row" id="filter-row">
      <button class="filter-pill active" data-filter="3months">3 Months</button>
      <button class="filter-pill" data-filter="6months">6 Months</button>
      <button class="filter-pill" data-filter="ytd">Year to Date</button>
      <button class="filter-pill" data-filter="all">All Time</button>
      <button class="filter-pill" data-filter="custom" id="custom-pill">Custom</button>
    </div>
  </div>

  <div class="date-range-row" id="date-range-row">
    <span class="date-range-label">From</span>
    <input type="date" id="date-from">
    <span class="date-range-label">To</span>
    <input type="date" id="date-to">
    <button class="date-range-apply" id="date-range-apply">Apply</button>
  </div>

  <!-- Period Summary -->
  <div class="section-label">Period Summary</div>
  <div class="stats-row" id="period-stats">
    <div class="stat-card">
      <div class="stat-label">This Week</div>
      <div class="stat-value" id="stat-this-week">—</div>
      <div class="stat-sub" id="stat-this-week-cmp"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">This Month</div>
      <div class="stat-value" id="stat-this-month">—</div>
      <div class="stat-sub" id="stat-this-month-cmp"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last Month</div>
      <div class="stat-value" id="stat-last-month">—</div>
      <div class="stat-sub" id="stat-last-month-cmp"></div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Daily Avg (This Month)</div>
      <div class="stat-value" id="stat-daily-avg">—</div>
      <div class="stat-sub" id="stat-daily-avg-cmp"></div>
    </div>
  </div>

  <!-- Charts -->
  <div class="charts-grid">
    <div class="chart-card full-width">
      <div class="chart-title">Category Trends (Last 6 Months)</div>
      <div class="chart-wrap" id="chart-cat-trends" style="height:300px"></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Day of Week Spending</div>
      <div class="chart-wrap" id="chart-dow" style="height:280px"></div>
    </div>

    <div class="chart-card">
      <div class="chart-title">Top 10 Merchants</div>
      <div class="chart-wrap" id="chart-merchants" style="height:280px"></div>
    </div>

    <div class="chart-card full-width">
      <div class="chart-title">Spending Velocity</div>
      <div class="chart-wrap" id="chart-velocity" style="height:280px"></div>
    </div>
  </div>
</div>

<script>
  const rawSummary = {{ summary|tojson }};

  // ── Plotly theme (shared pattern from dashboard) ──
  function getThemeColors() {
    const style = getComputedStyle(document.documentElement);
    const get = (v) => style.getPropertyValue(v).trim();
    const theme = document.documentElement.getAttribute('data-theme') || 'github-dark';
    const isDark = theme.endsWith('-dark');
    return {
      PLOT_BG: get('--surface'),
      PAPER_BG: get('--surface'),
      FONT_COLOR: get('--muted'),
      GRID_COLOR: get('--border'),
      ACCENT: get('--accent'),
      SAVINGS_COLOR: get('--savings'),
      CC_COLOR: get('--cc'),
      SUCCESS: get('--success'),
      DANGER: get('--danger'),
      FILL_ALPHA: isDark ? (get('--accent') + '18') : (get('--accent') + '14'),
      CAT_COLORS: [get('--accent'), get('--success'), get('--cc'), get('--danger'), get('--savings'),
                   get('--muted'), get('--accent-dim'), get('--success'), get('--cc'), get('--danger')],
    };
  }

  const plotLayout = (overrides = {}) => {
    const c = getThemeColors();
    return {
      paper_bgcolor: c.PAPER_BG,
      plot_bgcolor: c.PLOT_BG,
      font: { family: "'DM Mono', monospace", color: c.FONT_COLOR, size: 11 },
      margin: { t: 10, b: 40, l: 50, r: 10 },
      xaxis: { gridcolor: c.GRID_COLOR, linecolor: c.GRID_COLOR, tickcolor: c.GRID_COLOR, fixedrange: true },
      yaxis: { gridcolor: c.GRID_COLOR, linecolor: c.GRID_COLOR, tickcolor: c.GRID_COLOR, fixedrange: true },
      dragmode: false,
      ...overrides,
    };
  };

  const plotConfig = { responsive: true, displayModeBar: false, scrollZoom: false, staticPlot: false };

  function fmt(n) {
    return '₹' + Math.round(n).toLocaleString('en-IN');
  }

  // ── Helpers ──
  function getAllExpenses() {
    return (rawSummary.transactions || []).filter(t => t.type === 'Expense' && t.track !== false && !t.parent_id);
  }

  function inDateRange(startDate, endDate) {
    return (t) => t.date >= startDate && t.date <= endDate;
  }

  function toYMD(d) {
    return d.toISOString().slice(0, 10);
  }

  function getMonday(d) {
    const day = d.getDay();
    const diff = d.getDate() - day + (day === 0 ? -6 : 1);
    return new Date(d.getFullYear(), d.getMonth(), diff);
  }

  function pctChange(current, previous) {
    if (previous === 0) return current > 0 ? { pct: 100, dir: 'up' } : { pct: 0, dir: 'neutral' };
    const pct = Math.round(((current - previous) / previous) * 100);
    const dir = pct > 0 ? 'up' : pct < 0 ? 'down' : 'neutral';
    return { pct: Math.abs(pct), dir };
  }

  function renderComparison(elId, change) {
    const el = document.getElementById(elId);
    if (!el) return;
    if (change.dir === 'neutral') {
      el.innerHTML = '<span class="neutral">No change</span>';
    } else if (change.dir === 'up') {
      el.innerHTML = `<span class="up">▲ ${change.pct}% more than prev period</span>`;
    } else {
      el.innerHTML = `<span class="down">▼ ${change.pct}% less than prev period</span>`;
    }
  }

  // ── Filter state ──
  let customFrom = null;
  let customTo = null;

  function getFilterRange(filter) {
    const now = new Date();
    if (filter === '3months') {
      return { start: toYMD(new Date(now.getFullYear(), now.getMonth() - 2, 1)), end: toYMD(now) };
    } else if (filter === '6months') {
      return { start: toYMD(new Date(now.getFullYear(), now.getMonth() - 5, 1)), end: toYMD(now) };
    } else if (filter === 'ytd') {
      return { start: toYMD(new Date(now.getFullYear(), 0, 1)), end: toYMD(now) };
    } else if (filter === 'custom' && customFrom && customTo) {
      return { start: customFrom, end: customTo };
    }
    // 'all' — no filter
    return { start: null, end: null };
  }

  // ── Render all analytics ──
  function renderAnalytics(filter = '3months') {
    const allTxns = getAllExpenses();
    const range = getFilterRange(filter);
    const txns = range.start ? allTxns.filter(inDateRange(range.start, range.end)) : allTxns;
    const c = getThemeColors();
    const now = new Date();

    // ═══ Period Summary ═══
    // This week (Mon-Sun)
    const thisMonday = getMonday(new Date(now));
    const lastMonday = new Date(thisMonday);
    lastMonday.setDate(lastMonday.getDate() - 7);
    const thisSunday = new Date(thisMonday);
    thisSunday.setDate(thisSunday.getDate() + 6);
    const lastSunday = new Date(lastMonday);
    lastSunday.setDate(lastSunday.getDate() + 6);

    const thisWeekTotal = allTxns.filter(inDateRange(toYMD(thisMonday), toYMD(thisSunday))).reduce((s, t) => s + t.amount, 0);
    const lastWeekTotal = allTxns.filter(inDateRange(toYMD(lastMonday), toYMD(lastSunday))).reduce((s, t) => s + t.amount, 0);

    animateStat('stat-this-week', thisWeekTotal);
    renderComparison('stat-this-week-cmp', pctChange(thisWeekTotal, lastWeekTotal));

    // This month
    const thisMonthStart = toYMD(new Date(now.getFullYear(), now.getMonth(), 1));
    const thisMonthEnd = toYMD(new Date(now.getFullYear(), now.getMonth() + 1, 0));
    const lastMonthStart = toYMD(new Date(now.getFullYear(), now.getMonth() - 1, 1));
    const lastMonthEnd = toYMD(new Date(now.getFullYear(), now.getMonth(), 0));
    const prevMonthStart = toYMD(new Date(now.getFullYear(), now.getMonth() - 2, 1));
    const prevMonthEnd = toYMD(new Date(now.getFullYear(), now.getMonth() - 1, 0));

    const thisMonthTotal = allTxns.filter(inDateRange(thisMonthStart, thisMonthEnd)).reduce((s, t) => s + t.amount, 0);
    const lastMonthTotal = allTxns.filter(inDateRange(lastMonthStart, lastMonthEnd)).reduce((s, t) => s + t.amount, 0);
    const prevMonthTotal = allTxns.filter(inDateRange(prevMonthStart, prevMonthEnd)).reduce((s, t) => s + t.amount, 0);

    animateStat('stat-this-month', thisMonthTotal);
    renderComparison('stat-this-month-cmp', pctChange(thisMonthTotal, lastMonthTotal));

    animateStat('stat-last-month', lastMonthTotal);
    renderComparison('stat-last-month-cmp', pctChange(lastMonthTotal, prevMonthTotal));

    // Daily avg this month
    const daysElapsed = now.getDate();
    const thisAvg = daysElapsed > 0 ? thisMonthTotal / daysElapsed : 0;
    const lastMonthDays = new Date(now.getFullYear(), now.getMonth(), 0).getDate();
    const lastAvg = lastMonthDays > 0 ? lastMonthTotal / lastMonthDays : 0;

    animateStat('stat-daily-avg', thisAvg);
    renderComparison('stat-daily-avg-cmp', pctChange(thisAvg, lastAvg));

    triggerFadeIn('#period-stats');

    // ═══ Category Trends ═══
    const months = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
      months.push({ key: toYMD(d).slice(0, 7), label: d.toLocaleDateString('en-IN', { month: 'short', year: 'numeric' }) });
    }

    // Group by month+category
    const catMonthly = {};
    const catTotals = {};
    txns.forEach(t => {
      const mk = t.date.slice(0, 7);
      if (!months.some(m => m.key === mk)) return;
      const cat = t.category || 'Other';
      catTotals[cat] = (catTotals[cat] || 0) + t.amount;
      if (!catMonthly[cat]) catMonthly[cat] = {};
      catMonthly[cat][mk] = (catMonthly[cat][mk] || 0) + t.amount;
    });

    // Top 5 categories
    const topCats = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 5).map(e => e[0]);
    const catTraces = topCats.map((cat, i) => ({
      x: months.map(m => m.label),
      y: months.map(m => (catMonthly[cat] || {})[m.key] || 0),
      type: 'scatter', mode: 'lines+markers',
      name: cat,
      line: { color: c.CAT_COLORS[i % c.CAT_COLORS.length], width: 2 },
      marker: { size: 5 },
      hovertemplate: '<b>%{fullData.name}</b><br>%{x}: ₹%{y:,.0f}<extra></extra>',
    }));

    if (catTraces.length > 0) {
      Plotly.react('chart-cat-trends', catTraces, plotLayout({
        margin: { t: 10, b: 50, l: 60, r: 10 },
        legend: { font: { color: c.FONT_COLOR, size: 10 }, orientation: 'h', y: -0.2 },
        showlegend: true,
      }), plotConfig);
    } else {
      document.getElementById('chart-cat-trends').innerHTML = '<div class="chart-empty">Not enough data for trends</div>';
    }

    // ═══ Day of Week Pattern ═══
    const dowTotals = [0, 0, 0, 0, 0, 0, 0]; // Mon-Sun
    const dowCounts = [0, 0, 0, 0, 0, 0, 0];
    txns.forEach(t => {
      const d = new Date(t.date + 'T12:00:00');
      const day = d.getDay(); // 0=Sun
      const idx = day === 0 ? 6 : day - 1; // Mon=0, Sun=6
      dowTotals[idx] += t.amount;
      dowCounts[idx]++;
    });
    const dowAvgs = dowTotals.map((total, i) => dowCounts[i] > 0 ? total / dowCounts[i] : 0);
    const dowLabels = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
    const maxDow = Math.max(...dowAvgs);
    const dowColors = dowAvgs.map(v => v === maxDow && maxDow > 0 ? c.ACCENT : c.CAT_COLORS[5]);

    Plotly.react('chart-dow', [{
      x: dowLabels, y: dowAvgs, type: 'bar',
      marker: { color: dowColors },
      hovertemplate: '<b>%{x}</b><br>Avg: ₹%{y:,.0f}<extra></extra>',
    }], plotLayout({ margin: { t: 10, b: 40, l: 60, r: 10 } }), plotConfig);

    // ═══ Merchant Analysis ═══
    const merchants = {};
    txns.forEach(t => {
      const name = (t.description || '').trim();
      if (!name) return;
      // Normalize: take first meaningful part
      const normalized = name.replace(/\s*\(.*\)$/, '').trim(); // Remove "(Swiggy)" suffixes
      merchants[normalized] = (merchants[normalized] || 0) + t.amount;
    });

    const topMerchants = Object.entries(merchants).sort((a, b) => b[1] - a[1]).slice(0, 10).reverse();

    if (topMerchants.length > 0) {
      Plotly.react('chart-merchants', [{
        x: topMerchants.map(e => e[1]),
        y: topMerchants.map(e => e[0]),
        type: 'bar', orientation: 'h',
        marker: { color: topMerchants.map((_, i) => c.CAT_COLORS[i % c.CAT_COLORS.length]) },
        hovertemplate: '<b>%{y}</b><br>₹%{x:,.0f}<extra></extra>',
      }], plotLayout({
        margin: { t: 10, b: 30, l: 160, r: 20 },
        yaxis: { automargin: true },
      }), plotConfig);
    } else {
      document.getElementById('chart-merchants').innerHTML = '<div class="chart-empty">No merchant data available</div>';
    }

    // ═══ Spending Velocity ═══
    const thisMonthTxns = allTxns.filter(inDateRange(thisMonthStart, thisMonthEnd)).sort((a, b) => a.date.localeCompare(b.date));
    const lastMonthTxns = allTxns.filter(inDateRange(lastMonthStart, lastMonthEnd)).sort((a, b) => a.date.localeCompare(b.date));

    function cumulativeByDay(txnList) {
      const daily = {};
      txnList.forEach(t => {
        const dayNum = parseInt(t.date.slice(8, 10));
        daily[dayNum] = (daily[dayNum] || 0) + t.amount;
      });
      const days = [];
      const cumulative = [];
      let running = 0;
      const maxDay = Math.max(...Object.keys(daily).map(Number), 0);
      for (let d = 1; d <= maxDay; d++) {
        running += (daily[d] || 0);
        days.push(d);
        cumulative.push(running);
      }
      return { days, cumulative };
    }

    const thisVel = cumulativeByDay(thisMonthTxns);
    const lastVel = cumulativeByDay(lastMonthTxns);

    const velTraces = [];
    if (thisVel.days.length > 0) {
      velTraces.push({
        x: thisVel.days, y: thisVel.cumulative,
        type: 'scatter', mode: 'lines+markers',
        name: 'This Month',
        line: { color: c.ACCENT, width: 2.5 },
        marker: { size: 4 },
        fill: 'tozeroy',
        fillcolor: c.FILL_ALPHA,
        hovertemplate: 'Day %{x}<br>₹%{y:,.0f}<extra>This Month</extra>',
      });
    }
    if (lastVel.days.length > 0) {
      velTraces.push({
        x: lastVel.days, y: lastVel.cumulative,
        type: 'scatter', mode: 'lines',
        name: 'Last Month',
        line: { color: c.CAT_COLORS[5], width: 2, dash: 'dot' },
        hovertemplate: 'Day %{x}<br>₹%{y:,.0f}<extra>Last Month</extra>',
      });
    }

    if (velTraces.length > 0) {
      Plotly.react('chart-velocity', velTraces, plotLayout({
        margin: { t: 10, b: 50, l: 70, r: 10 },
        xaxis: { title: { text: 'Day of Month', font: { size: 11 } }, gridcolor: c.GRID_COLOR, fixedrange: true },
        legend: { font: { color: c.FONT_COLOR, size: 10 }, orientation: 'h', y: -0.25 },
        showlegend: true,
      }), plotConfig);
    } else {
      document.getElementById('chart-velocity').innerHTML = '<div class="chart-empty">Not enough data for velocity comparison</div>';
    }
  }
</script>
<script src="/static/theme.js"></script>
<script>
  initTheme();

  function getActiveFilter() {
    const active = document.querySelector('.filter-pill.active');
    return active ? active.dataset.filter : '3months';
  }

  initThemePicker(function() { renderAnalytics(getActiveFilter()); });

  // Initial render
  renderAnalytics('3months');

  // Filter pills
  document.getElementById('filter-row').addEventListener('click', function(e) {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');

    const dateRow = document.getElementById('date-range-row');
    if (pill.dataset.filter === 'custom') {
      dateRow.classList.add('open');
    } else {
      dateRow.classList.remove('open');
      renderAnalytics(pill.dataset.filter);
    }
  });

  // Custom date range
  document.getElementById('date-range-apply').addEventListener('click', function() {
    const from = document.getElementById('date-from').value;
    const to = document.getElementById('date-to').value;
    if (!from || !to) return;
    customFrom = from;
    customTo = to;
    renderAnalytics('custom');
  });

  initPullToRefresh();
</script>
</body>
</html>
