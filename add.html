<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>{% if parent %}Add Sub-expense{% else %}Add Expense{% endif %} — Kharcha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --accent-dim: #c8e000;
      --text: #f0f0f0;
      --muted: #666;
      --danger: #ff4d4d;
      --success: #4dff91;
      --savings: #47b4ff;
      --cc: #ff8c47;
      --radius: 12px;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      padding-bottom: 40px;
    }

    /* ── Nav ── */
    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 10;
    }

    .nav-logo {
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.3rem;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .nav-links {
      display: flex;
      gap: 4px;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.75rem;
      padding: 6px 12px;
      border-radius: 6px;
      transition: all 0.15s;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-links a:hover, .nav-links a.active {
      color: var(--text);
      background: var(--surface2);
    }

    .nav-links a.active {
      color: var(--accent);
    }

    /* ── Page container ── */
    .container {
      max-width: 540px;
      margin: 0 auto;
      padding: 24px 20px;
    }

    /* ── Page title ── */
    .page-header {
      margin-bottom: 28px;
    }

    .page-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 1.6rem;
      line-height: 1.1;
      margin-bottom: 6px;
    }

    .page-sub {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    /* ── Parent badge ── */
    .parent-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 0.8rem;
    }

    .parent-badge-label {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.7rem;
    }

    .parent-badge-desc {
      font-weight: 500;
      color: var(--text);
    }

    .parent-badge-amount {
      margin-left: auto;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 7px;
    }

    input, select, textarea {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.95rem;
      padding: 13px 14px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      -webkit-appearance: none;
      appearance: none;
    }

    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(232, 255, 71, 0.08);
    }

    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1) opacity(0.4);
    }

    /* ── Amount field ── */
    .amount-wrap {
      position: relative;
    }

    .amount-prefix {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--accent);
      font-size: 1rem;
      font-weight: 500;
      pointer-events: none;
    }

    .amount-wrap input {
      padding-left: 30px;
      font-size: 1.3rem;
      font-weight: 500;
    }

    /* ── Account toggle ── */
    .account-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .account-btn {
      position: relative;
    }

    .account-btn input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
    }

    .account-btn label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      transition: all 0.15s;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin: 0;
    }

    .account-btn input[type="radio"]:checked + label {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(232, 255, 71, 0.06);
    }

    .account-btn.savings input[type="radio"]:checked + label {
      border-color: var(--savings);
      background: rgba(71, 180, 255, 0.06);
      color: var(--savings);
    }

    .account-btn.cc input[type="radio"]:checked + label {
      border-color: var(--cc);
      background: rgba(255, 140, 71, 0.06);
      color: var(--cc);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: currentColor;
    }

    /* ── Category row ── */
    .category-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .new-cat-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 1.1rem;
      width: 48px;
      cursor: pointer;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .new-cat-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── New category modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: none;
      align-items: flex-end;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      max-width: 540px;
      animation: slide-up 0.2s ease;
    }

    @keyframes slide-up {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    .modal-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 0 auto 20px;
    }

    .modal-title {
      font-family: var(--font-display);
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    /* ── Submit button ── */
    .submit-btn {
      width: 100%;
      background: var(--accent);
      color: #0d0d0d;
      border: none;
      border-radius: var(--radius);
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      padding: 16px;
      cursor: pointer;
      transition: all 0.15s;
      margin-top: 8px;
      letter-spacing: 0.3px;
    }

    .submit-btn:hover {
      background: var(--accent-dim);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 50px;
      padding: 12px 20px;
      font-size: 0.85rem;
      z-index: 200;
      transition: transform 0.3s ease;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { border-color: var(--success); color: var(--success); }
    .toast.error { border-color: var(--danger); color: var(--danger); }

    /* ── Divider ── */
    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 24px 0;
    }

    select option {
      background: #1a1a1a;
    }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">kharcha</span>
  <div class="nav-links">
    <a href="/add" class="active">+ Add</a>
    <a href="/expenses">List</a>
    <a href="/dashboard">Chart</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    {% if parent %}
      <div class="page-title">Sub-expense</div>
      <div class="page-sub">Attached to parent transaction #{{ parent.id }}</div>
    {% else %}
      <div class="page-title">New expense</div>
      <div class="page-sub">{{ today }}</div>
    {% endif %}
  </div>

  {% if parent %}
  <div class="parent-badge">
    <div>
      <div class="parent-badge-label">Parent</div>
      <div class="parent-badge-desc">{{ parent.description }}</div>
    </div>
    <div class="parent-badge-amount">₹{{ "%.2f"|format(parent.amount) }}</div>
  </div>
  {% endif %}

  <form id="expense-form">
    {% if parent %}
    <input type="hidden" id="parent_id" value="{{ parent.id }}">
    {% endif %}

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" value="{{ today }}" required>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <input type="text" id="description" placeholder="e.g. Tesco grocery run" required autocomplete="off">
    </div>

    <div class="form-group">
      <label>Account</label>
      <div class="account-toggle">
        <div class="account-btn savings">
          <input type="radio" name="account" id="acc-savings" value="Savings" checked>
          <label for="acc-savings"><span class="dot"></span> Savings</label>
        </div>
        <div class="account-btn cc">
          <input type="radio" name="account" id="acc-cc" value="Credit Card">
          <label for="acc-cc"><span class="dot"></span> Credit Card</label>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="amount">Amount</label>
      <div class="amount-wrap">
        <span class="amount-prefix">₹</span>
        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required inputmode="decimal">
      </div>
    </div>

    <hr class="divider">

    <div class="form-group">
      <label>Category</label>
      <div class="category-row">
        <select id="category" required>
          <option value="" disabled selected>Select category</option>
          {% for cat in categories %}
          <option value="{{ cat }}">{{ cat }}</option>
          {% endfor %}
        </select>
        <button type="button" class="new-cat-btn" id="new-cat-btn" title="Add new category">+</button>
      </div>
    </div>

    <div class="form-group" id="subcategory-group">
      <label>Sub-category <span style="color:var(--muted)">(optional)</span></label>
      <div class="category-row">
        <select id="sub_category">
          <option value="">None</option>
        </select>
        <button type="button" class="new-cat-btn" id="new-subcat-btn" title="Add new sub-category" disabled>+</button>
      </div>
    </div>

    <button type="submit" class="submit-btn" id="submit-btn">
      {% if parent %}Add Sub-expense{% else %}Save Expense{% endif %}
    </button>
  </form>
</div>

<!-- New Category Modal -->
<div class="modal-overlay" id="cat-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modal-title">New Category</div>
    <div class="form-group" id="modal-cat-group">
      <label>Category name</label>
      <input type="text" id="modal-cat-name" placeholder="e.g. Travel" autocomplete="off">
    </div>
    <div class="form-group" id="modal-subcat-group" style="display:none">
      <label>Sub-category name</label>
      <input type="text" id="modal-subcat-name" placeholder="e.g. Flights" autocomplete="off">
    </div>
    <button class="submit-btn" id="modal-save-btn">Save</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const categories = {{ categories | tojson }};
  let modalMode = 'category'; // 'category' or 'subcategory'

  // ── Populate sub-category on category change ──
  document.getElementById('category').addEventListener('change', function() {
    const cat = this.value;
    const subSelect = document.getElementById('sub_category');
    const newSubBtn = document.getElementById('new-subcat-btn');

    subSelect.innerHTML = '<option value="">None</option>';
    if (categories[cat]) {
      categories[cat].forEach(sub => {
        const opt = document.createElement('option');
        opt.value = sub;
        opt.textContent = sub;
        subSelect.appendChild(opt);
      });
    }
    newSubBtn.disabled = false;
  });

  // ── Modal open ──
  document.getElementById('new-cat-btn').addEventListener('click', () => {
    modalMode = 'category';
    document.getElementById('modal-title').textContent = 'New Category';
    document.getElementById('modal-cat-group').style.display = 'block';
    document.getElementById('modal-subcat-group').style.display = 'none';
    document.getElementById('modal-cat-name').value = '';
    document.getElementById('cat-modal').classList.add('open');
    setTimeout(() => document.getElementById('modal-cat-name').focus(), 200);
  });

  document.getElementById('new-subcat-btn').addEventListener('click', () => {
    const cat = document.getElementById('category').value;
    if (!cat) return;
    modalMode = 'subcategory';
    document.getElementById('modal-title').textContent = `New Sub-category in "${cat}"`;
    document.getElementById('modal-cat-group').style.display = 'none';
    document.getElementById('modal-subcat-group').style.display = 'block';
    document.getElementById('modal-subcat-name').value = '';
    document.getElementById('cat-modal').classList.add('open');
    setTimeout(() => document.getElementById('modal-subcat-name').focus(), 200);
  });

  // ── Modal close on overlay click ──
  document.getElementById('cat-modal').addEventListener('click', function(e) {
    if (e.target === this) this.classList.remove('open');
  });

  // ── Modal save ──
  document.getElementById('modal-save-btn').addEventListener('click', async () => {
    const catName = modalMode === 'category'
      ? document.getElementById('modal-cat-name').value.trim()
      : document.getElementById('category').value;
    const subName = modalMode === 'subcategory'
      ? document.getElementById('modal-subcat-name').value.trim()
      : '';

    if (!catName) return;

    const res = await fetch('/api/categories', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ category: catName, sub_category: subName })
    });
    const data = await res.json();

    if (data.success) {
      // Update local categories
      Object.assign(categories, data.categories);

      // Refresh category select
      const catSelect = document.getElementById('category');
      if (modalMode === 'category') {
        const opt = document.createElement('option');
        opt.value = catName;
        opt.textContent = catName;
        catSelect.appendChild(opt);
        catSelect.value = catName;
        catSelect.dispatchEvent(new Event('change'));
      } else if (subName) {
        const subSelect = document.getElementById('sub_category');
        const opt = document.createElement('option');
        opt.value = subName;
        opt.textContent = subName;
        subSelect.appendChild(opt);
        subSelect.value = subName;
      }

      document.getElementById('cat-modal').classList.remove('open');
      showToast('Saved!', 'success');
    }
  });

  // ── Form submit ──
  document.getElementById('expense-form').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = 'Saving…';

    const parentIdEl = document.getElementById('parent_id');
    const payload = {
      date: document.getElementById('date').value,
      description: document.getElementById('description').value,
      account: document.querySelector('input[name="account"]:checked').value,
      amount: document.getElementById('amount').value,
      category: document.getElementById('category').value,
      sub_category: document.getElementById('sub_category').value,
      parent_id: parentIdEl ? parseInt(parentIdEl.value) : null,
    };

    try {
      const res = await fetch('/api/transactions', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();

      if (data.success) {
        showToast('Expense saved ✓', 'success');
        setTimeout(() => {
          {% if parent %}
          window.location.href = '/expenses';
          {% else %}
          document.getElementById('expense-form').reset();
          document.getElementById('date').value = '{{ today }}';
          document.getElementById('sub_category').innerHTML = '<option value="">None</option>';
          document.getElementById('new-subcat-btn').disabled = true;
          btn.disabled = false;
          btn.textContent = 'Save Expense';
          {% endif %}
        }, 800);
      } else {
        showToast('Error: ' + data.error, 'error');
        btn.disabled = false;
        btn.textContent = '{% if parent %}Add Sub-expense{% else %}Save Expense{% endif %}';
      }
    } catch (err) {
      showToast('Network error', 'error');
      btn.disabled = false;
      btn.textContent = '{% if parent %}Add Sub-expense{% else %}Save Expense{% endif %}';
    }
  });

  // ── Toast helper ──
  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 2500);
  }
</script>
</body>
</html>
