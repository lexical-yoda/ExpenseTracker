services:
  expense-manager:
    image: ghcr.io/lexical-yoda/expensetracker:latest
    container_name: expense-manager
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - SECURE_COOKIES=false
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    restart: unless-stopped

# For automatic email ingestion, set up n8n separately.
# See the Settings page in the app for a full setup guide.
