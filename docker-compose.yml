services:
  expense-manager:
    image: ghcr.io/lexical-yoda/expensetracker:latest
    container_name: expense-manager
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
    environment:
      - HOST=0.0.0.0
      - PORT=5000
      - SECURE_COOKIES=false
    restart: unless-stopped
