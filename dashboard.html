<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Dashboard — Kharcha</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/plotly.js/2.26.0/plotly.min.js"></script>
  <style>
    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --border: #2a2a2a;
      --accent: #e8ff47;
      --text: #f0f0f0;
      --muted: #666;
      --savings: #47b4ff;
      --cc: #ff8c47;
      --radius: 12px;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg); color: var(--text);
      font-family: var(--font-mono); min-height: 100vh; padding-bottom: 60px;
    }
    nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px; border-bottom: 1px solid var(--border);
      position: sticky; top: 0; background: var(--bg); z-index: 10;
    }
    .nav-logo { font-family: var(--font-display); font-weight: 800; font-size: 1.3rem; color: var(--accent); letter-spacing: -0.5px; }
    .nav-links { display: flex; gap: 4px; }
    .nav-links a {
      color: var(--muted); text-decoration: none; font-size: 0.75rem;
      padding: 6px 12px; border-radius: 6px; transition: all 0.15s;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); background: var(--surface2); }
    .nav-links a.active { color: var(--accent); }

    .container { max-width: 720px; margin: 0 auto; padding: 24px 20px; }

    .page-header { margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-title { font-family: var(--font-display); font-weight: 700; font-size: 1.6rem; }

    /* Filter pills */
    .filter-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .filter-pill {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 50px; color: var(--muted); font-family: var(--font-mono);
      font-size: 0.72rem; padding: 6px 14px; cursor: pointer; transition: all 0.15s;
      text-transform: uppercase; letter-spacing: 0.5px;
    }
    .filter-pill:hover { border-color: #3a3a3a; color: var(--text); }
    .filter-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(232,255,71,0.06); }

    /* Stat cards */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }
    @media (max-width: 480px) { .stats-row { grid-template-columns: 1fr 1fr; } }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }
    .stat-label { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); margin-bottom: 6px; }
    .stat-value { font-family: var(--font-display); font-size: 1.3rem; font-weight: 700; }
    .stat-sub { font-size: 0.7rem; color: var(--muted); margin-top: 3px; }

    /* Chart cards */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }
    .chart-title { font-family: var(--font-display); font-weight: 600; font-size: 0.95rem; margin-bottom: 16px; color: var(--text); }
    .chart-wrap { width: 100%; }

    /* Empty */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty-icon { font-size: 2.5rem; margin-bottom: 12px; }
    .empty-title { font-family: var(--font-display); font-size: 1.1rem; color: var(--text); margin-bottom: 6px; }
    .empty-link {
      display: inline-block; margin-top: 16px; background: var(--accent); color: #0d0d0d;
      font-family: var(--font-display); font-weight: 700; font-size: 0.85rem;
      padding: 10px 20px; border-radius: 8px; text-decoration: none;
    }
  </style>
</head>
<body>

<nav>
  <span class="nav-logo">kharcha</span>
  <div class="nav-links">
    <a href="/add">+ Add</a>
    <a href="/expenses">List</a>
    <a href="/dashboard" class="active">Chart</a>
  </div>
</nav>

<div class="container">
  <div class="page-header">
    <div class="page-title">Dashboard</div>
    <div class="filter-row" id="filter-row">
      <button class="filter-pill active" data-filter="month">This Month</button>
      <button class="filter-pill" data-filter="3months">3 Months</button>
      <button class="filter-pill" data-filter="ytd">Year to Date</button>
      <button class="filter-pill" data-filter="all">All Time</button>
    </div>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="stat-card">
      <div class="stat-label">Total Spent</div>
      <div class="stat-value" id="stat-total">₹0</div>
      <div class="stat-sub" id="stat-period">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Savings Used</div>
      <div class="stat-value" id="stat-savings" style="color:var(--savings)">₹0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">CC Spend</div>
      <div class="stat-value" id="stat-cc" style="color:var(--cc)">₹0</div>
    </div>
  </div>

  <div id="charts-container">
    <div class="chart-card">
      <div class="chart-title">Daily Spending</div>
      <div class="chart-wrap" id="chart-daily" style="height:220px"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">By Category</div>
      <div class="chart-wrap" id="chart-category" style="height:280px"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Savings vs Credit Card</div>
      <div class="chart-wrap" id="chart-account" style="height:220px"></div>
    </div>
    <div class="chart-card">
      <div class="chart-title">Month over Month</div>
      <div class="chart-wrap" id="chart-monthly" style="height:220px"></div>
    </div>
  </div>
</div>

<script>
  const rawSummary = {{ summary|safe }};

  // ── Plotly theme ──
  const PLOT_BG = '#161616';
  const PAPER_BG = '#161616';
  const FONT_COLOR = '#a0a0a0';
  const GRID_COLOR = '#2a2a2a';
  const ACCENT = '#e8ff47';
  const SAVINGS_COLOR = '#47b4ff';
  const CC_COLOR = '#ff8c47';
  const CAT_COLORS = ['#e8ff47','#47b4ff','#ff8c47','#ff47b4','#47ffb4','#b447ff','#ff6b6b','#6bfff0','#ffa347','#47a3ff'];

  const plotLayout = (overrides = {}) => ({
    paper_bgcolor: PAPER_BG,
    plot_bgcolor: PLOT_BG,
    font: { family: "'DM Mono', monospace", color: FONT_COLOR, size: 11 },
    margin: { t: 10, b: 40, l: 50, r: 10 },
    xaxis: { gridcolor: GRID_COLOR, linecolor: GRID_COLOR, tickcolor: GRID_COLOR },
    yaxis: { gridcolor: GRID_COLOR, linecolor: GRID_COLOR, tickcolor: GRID_COLOR },
    ...overrides,
  });

  const plotConfig = { responsive: true, displayModeBar: false };

  // ── Date filtering ──
  function filterData(filter) {
    const now = new Date();
    let cutoff = null;

    if (filter === 'month') {
      cutoff = new Date(now.getFullYear(), now.getMonth(), 1);
    } else if (filter === '3months') {
      cutoff = new Date(now.getFullYear(), now.getMonth() - 2, 1);
    } else if (filter === 'ytd') {
      cutoff = new Date(now.getFullYear(), 0, 1);
    }

    // Filter daily
    const daily = {};
    Object.entries(rawSummary.daily || {}).forEach(([d, v]) => {
      if (!cutoff || new Date(d) >= cutoff) daily[d] = v;
    });

    // Filter by_category from transactions
    const byCat = {};
    const byAcc = { 'Savings': 0, 'Credit Card': 0 };
    (rawSummary.transactions || []).forEach(t => {
      if (!cutoff || new Date(t.date) >= cutoff) {
        byCat[t.category] = (byCat[t.category] || 0) + t.amount;
        byAcc[t.account] = (byAcc[t.account] || 0) + t.amount;
      }
    });

    return { daily, byCat, byAcc };
  }

  function fmt(n) {
    return '₹' + Math.round(n).toLocaleString('en-IN');
  }

  function renderAll(filter) {
    const { daily, byCat, byAcc } = filterData(filter);

    // Stats
    const total = Object.values(byAcc).reduce((a, b) => a + b, 0);
    document.getElementById('stat-total').textContent = fmt(total);
    document.getElementById('stat-savings').textContent = fmt(byAcc['Savings'] || 0);
    document.getElementById('stat-cc').textContent = fmt(byAcc['Credit Card'] || 0);

    // Daily chart
    const dailyDates = Object.keys(daily).sort();
    const dailyVals = dailyDates.map(d => daily[d]);
    Plotly.react('chart-daily', [{
      x: dailyDates, y: dailyVals, type: 'scatter', mode: 'lines+markers',
      line: { color: ACCENT, width: 2 },
      marker: { color: ACCENT, size: 5 },
      fill: 'tozeroy',
      fillcolor: 'rgba(232,255,71,0.06)',
      hovertemplate: '<b>%{x}</b><br>₹%{y:,.0f}<extra></extra>',
    }], plotLayout({ margin: { t: 10, b: 50, l: 60, r: 10 } }), plotConfig);

    // Category bar
    const catEntries = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
    Plotly.react('chart-category', [{
      x: catEntries.map(e => e[1]),
      y: catEntries.map(e => e[0]),
      type: 'bar', orientation: 'h',
      marker: { color: catEntries.map((_, i) => CAT_COLORS[i % CAT_COLORS.length]) },
      hovertemplate: '<b>%{y}</b><br>₹%{x:,.0f}<extra></extra>',
    }], plotLayout({
      margin: { t: 10, b: 30, l: 130, r: 20 },
      xaxis: { gridcolor: GRID_COLOR },
      yaxis: { automargin: true },
    }), plotConfig);

    // Account donut
    Plotly.react('chart-account', [{
      labels: ['Savings', 'Credit Card'],
      values: [byAcc['Savings'] || 0, byAcc['Credit Card'] || 0],
      type: 'pie',
      hole: 0.55,
      marker: { colors: [SAVINGS_COLOR, CC_COLOR] },
      textinfo: 'percent',
      hovertemplate: '<b>%{label}</b><br>₹%{value:,.0f}<br>%{percent}<extra></extra>',
      textfont: { color: '#0d0d0d', size: 11 },
    }], {
      ...plotLayout(),
      margin: { t: 20, b: 20, l: 20, r: 20 },
      legend: { font: { color: FONT_COLOR, size: 11 }, orientation: 'h', y: -0.1 },
      showlegend: true,
    }, plotConfig);

    // Month over month
    const monthly = rawSummary.monthly || {};
    const months = Object.keys(monthly).sort();
    const monthTotals = months.map(m => Object.values(monthly[m]).reduce((a, b) => a + b, 0));
    Plotly.react('chart-monthly', [{
      x: months, y: monthTotals, type: 'bar',
      marker: { color: months.map((m, i) => i === months.length - 1 ? ACCENT : '#3a3a3a') },
      hovertemplate: '<b>%{x}</b><br>₹%{y:,.0f}<extra></extra>',
    }], plotLayout({ margin: { t: 10, b: 50, l: 70, r: 10 } }), plotConfig);
  }

  // ── Filter pills ──
  document.getElementById('filter-row').addEventListener('click', function(e) {
    const pill = e.target.closest('.filter-pill');
    if (!pill) return;
    document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
    pill.classList.add('active');
    renderAll(pill.dataset.filter);
  });

  // ── Initial render ──
  renderAll('month');
</script>
</body>
</html>
